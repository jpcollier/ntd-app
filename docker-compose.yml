version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: ntd-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ntd_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ntd_password}
      POSTGRES_DB: ${POSTGRES_DB:-ntd_ridership}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ntd_user} -d ${POSTGRES_DB:-ntd_ridership}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ntd-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ntd_user}:${POSTGRES_PASSWORD:-ntd_password}@db:5432/${POSTGRES_DB:-ntd_ridership}
      BACKEND_CORS_ORIGINS: '["http://localhost:3000", "http://frontend:3000"]'
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ntd-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
