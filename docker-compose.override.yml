# Local development overrides — restores hot-reload for both services.
# Applied automatically by `docker compose up` when present.
# For production, use `docker compose -f docker-compose.yml up`.

version: '3.8'

services:
  backend:
    volumes:
      - ./backend:/app
      - ./data:/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
